service: crypto-portfolio-api

frameworkVersion: "4"

# Dashboard integration (optional - add your org/app when ready)
# org: shashankpandya
# app: crypto-portfolio

provider:
  name: aws
  runtime: nodejs22.x
  region: ap-south-1
  memorySize: 1024
  timeout: 28
  environment:
    NODE_ENV: production
    PORT: 3000
  httpApi:
    cors: true

functions:
  api:
    handler: server/handler.handler
    events:
      - httpApi:
          path: /{proxy+}
          method: ANY
      - httpApi:
          path: /
          method: ANY

plugins:
  - serverless-offline
  - serverless-dynamodb-local

package:
  individually: false
  patterns:
    - "!node_modules/**"
    - "!.git/**"
    - "!.env"
    - "!smart_contract/**"
    - "server/**"
    - "vite-project/dist/**"
