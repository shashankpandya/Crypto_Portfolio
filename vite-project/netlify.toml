# Global settings applied to the whole site.
[build]
  # Directory to change to before starting a build. 
  # This is where we will look for package.json/.nvmrc/etc.
  base = "/"

  # Directory that contains the deploy-ready HTML files and assets generated by
  # the build. This is relative to the base directory if one has been set, or the
  # root directory if a base has not been set. This sample publishes the
  # directory located at the absolute path "root/project/build-output"
  publish = "dist"

  # Default build command.
  command = "npm run build"

# Production context: all deploys from the Production branch set in your site's 
# deploy settings will inherit these settings.
[context.production]
  command = "npm run build"
  [context.production.environment]
    NODE_VERSION = "18"
    NPM_VERSION = "9"

# Deploy Preview context: all deploys generated from a pull/merge request will 
# inherit these settings.
[context.deploy-preview]
  command = "npm run build"

# Branch Deploy context: all deploys that are not from a pull/merge request or 
# from the Production branch will inherit these settings.
[context.branch-deploy]
  command = "npm run build"

# Specific branch context: all deploys from this specific branch will inherit
# these settings.
[context.feature]
  command = "npm run build"

# For more information see: https://www.netlify.com/docs/netlify-toml-reference/

# Redirects and headers are GLOBAL for all builds – they do not get scoped to 
# contexts no matter where you define them in the file.
# For context-specific rules, use _headers or _redirects files, which are 
# PER-DEPLOY.

# A basic redirect rule
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# A redirect rule with all the supported properties
[[redirects]]
  from = "/old-path"
  to = "/new-path"
  # The default HTTP status code is 301, but you can define a different one.
  status = 301
  force = false
  query = {path = ":path"}
  # Each combination of query params will be expanded to a separate rule
  conditions = {Language = ["en"], Country = ["US"], Role = ["admin"]}

# The following redirect is intended for use with most SPAs that handle
# routing internally.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Custom headers
[[headers]]
  # Define which paths this specific [[headers]] block will cover.
  for = "/*"
    [headers.values]
    Access-Control-Allow-Origin = "*"
